<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV Program Serija</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#111;
  color:#fff;
}

/* HEADER */
.header {
  background:#000;
  padding:15px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

/* OBAVESTENJE */
.notice {
  background:#1c1c1c;
  padding:10px;
  font-size:12px;
  text-align:center;
  color:#ccc;
  border-bottom:1px solid #333;
}

/* DAN */
.day {
  margin:15px 10px;
}

/* NASLOV DANA */
.day-title {
  font-size:16px;
  margin-bottom:8px;
  border-left:4px solid #e50914;
  padding-left:8px;
}

/* LISTA */
.list {
  background:#1a1a1a;
  border-radius:8px;
  overflow:hidden;
}

/* STAVKA */
.item {
  display:flex;
  align-items:center;
  padding:8px;
  border-bottom:1px solid #333;
}

.item:last-child {
  border-bottom:none;
}

/* SLIKA */
.item img {
  width:60px;
  height:90px;
  object-fit:cover;
  border-radius:5px;
  margin-right:10px;
}

/* TEKST */
.item .title {
  font-size:14px;
}

/* TMDB */
.tmdb {
  text-align:center;
  font-size:11px;
  color:#888;
  margin:15px;
}
</style>
</head>

<body>

<div class="header">📺 Weekly TV Series Schedule</div>

<div class="notice">
This is an informational schedule of TV series broadcasts. The application does not provide streaming or display video content.
</div>

<div id="content"></div>

<div class="tmdb">
Powered by TMDb – Nije zvanično povezan sa TMDb.
</div>

<script>
const API_KEY = "2701858e9bccab54d4d0e4931420a739"; // prebaci na backend!
const IMG = "https://image.tmdb.org/t/p/w200";

const program = {
  "Ponedeljak":[301693,245841],
  "Utorak":[306118,299847],
  "Sreda":[306529,300030],
  "Četvrtak":[302658,271548],
  "Petak":[298629],
  "Subota":[213194],
  "Nedelja":[111685]
};

const content = document.getElementById("content");

async function fetchShow(id){
  try{
    const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}&language=sr`);
    return await res.json();
  }catch{
    return null;
  }
}

async function load(){
  for(let day in program){

    const dayDiv = document.createElement("div");
    dayDiv.className="day";

    dayDiv.innerHTML=`<div class="day-title">${day}</div>`;

    const list = document.createElement("div");
    list.className="list";

    for(let id of program[day]){
      let show = await fetchShow(id);

      if(show && show.poster_path){
        const item = document.createElement("div");
        item.className="item";

        item.innerHTML=`
          <img loading="lazy" src="${IMG}${show.poster_path}">
          <div class="title">${show.name}</div>
        `;

        list.appendChild(item);
      }
    }

    dayDiv.appendChild(list);
    content.appendChild(dayDiv);
  }
}

load();
</script>

</body>
</html>
