<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV Program</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#141414;
  color:#fff;
}

.header {
  padding:15px;
  text-align:center;
  background:#000;
  font-size:18px;
}

.search {
  padding:10px;
  text-align:center;
}

.search input {
  width:90%;
  padding:8px;
  border-radius:5px;
  border:none;
}

.days {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

.day-btn {
  background:#333;
  padding:8px 12px;
  border-radius:5px;
  cursor:pointer;
  white-space:nowrap;
}

.active {
  background:#e50914;
}

.container {
  padding:10px;
}

.card {
  background:#222;
  border-radius:8px;
  margin-bottom:15px;
  overflow:hidden;
}

.card img {
  width:100%;
}

.card-content {
  padding:10px;
}

.title {
  font-size:14px;
  font-weight:bold;
}

.desc {
  font-size:12px;
  color:#ccc;
}

.btns {
  margin-top:10px;
  display:flex;
  justify-content:space-between;
}

button {
  padding:5px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.fav {
  background:#e50914;
  color:white;
}

.tmdb {
  text-align:center;
  font-size:11px;
  margin:15px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="header">📺 TV Program</div>

<div class="search">
  <input type="text" id="search" placeholder="Pretraga...">
</div>

<div class="days" id="days"></div>

<div class="container" id="list"></div>

<div class="tmdb">
  Powered by TMDb (nije zvanično povezan sa TMDb)
</div>

<script>
const API_KEY = "2701858e9bccab54d4d0e4931420a739"; // prebaci kasnije na backend!
const IMG = "https://image.tmdb.org/t/p/w500";

const program = {
  "Ponedeljak":[301693,245841],
  "Utorak":[306118,299847],
  "Sreda":[306529,300030],
  "Četvrtak":[302658,271548],
  "Petak":[298629],
  "Subota":[213194],
  "Nedelja":[111685]
};

let currentDay = "Ponedeljak";
let allData = [];

const daysDiv = document.getElementById("days");
const listDiv = document.getElementById("list");

function createDays(){
  Object.keys(program).forEach(day=>{
    const btn = document.createElement("div");
    btn.className="day-btn";
    btn.innerText=day;

    btn.onclick=()=>{
      document.querySelectorAll(".day-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      currentDay=day;
      load();
    }

    if(day===currentDay) btn.classList.add("active");

    daysDiv.appendChild(btn);
  });
}

async function fetchShow(id){
  const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${API_KEY}&language=sr`);
  return res.json();
}

function saveFav(id){
  let favs = JSON.parse(localStorage.getItem("favs")) || [];
  if(!favs.includes(id)){
    favs.push(id);
    localStorage.setItem("favs", JSON.stringify(favs));
    alert("Dodato u omiljene");
  }
}

function render(data){
  listDiv.innerHTML="";

  data.forEach(show=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <img src="${IMG}${show.poster_path}">
      <div class="card-content">
        <div class="title">${show.name}</div>
        <div class="desc">${show.overview?.slice(0,80) || "Nema opisa"}...</div>
        <div class="btns">
          <button class="fav" onclick="saveFav(${show.id})">⭐ Favorit</button>
        </div>
      </div>
    `;

    listDiv.appendChild(div);
  });
}

async function load(){
  listDiv.innerHTML="Učitavanje...";
  allData=[];

  for(let id of program[currentDay]){
    let d = await fetchShow(id);
    allData.push(d);
  }

  render(allData);
}

document.getElementById("search").addEventListener("input", (e)=>{
  const val = e.target.value.toLowerCase();
  const filtered = allData.filter(s=>s.name.toLowerCase().includes(val));
  render(filtered);
});

createDays();
load();
</script>

</body>
</html>
